<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI為末大学 | Tamesue Academy</title>
    <style>
        :root {
            --navy: #1a1f3d;
            --navy-light: #2a3050;
            --yellow: #f5d623;
            --yellow-soft: #fdf8e0;
            --yellow-hover: #e6c81a;
            --bg: #f7f6f3;
            --card: #ffffff;
            --text: #1a1f3d;
            --text-sub: #6b6f80;
            --text-faint: #9b9eb0;
            --border: #e8e8e8;
            --shadow: 0 2px 16px rgba(26,31,61,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ヘッダー */
        .header {
            background: var(--navy);
            padding: 24px 0;
            text-align: center;
        }
        .header .logo-mark {
            font-size: 32px;
            color: var(--yellow);
            font-weight: 900;
            letter-spacing: 8px;
        }
        .header .logo-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 4px;
            margin-top: 4px;
            font-weight: 400;
        }
        .header .ai-tag {
            display: inline-block;
            background: var(--yellow);
            color: var(--navy);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
            letter-spacing: 1px;
        }

        /* メイン */
        .main {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 20px 140px;
        }

        /* イントロ */
        .intro {
            text-align: center;
            padding: 48px 0 40px;
        }
        .intro .catchphrase {
            font-size: 22px;
            font-weight: 700;
            color: var(--navy);
            letter-spacing: 2px;
        }
        .intro .description {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 14px;
            line-height: 1.8;
        }
        .intro .stats {
            font-size: 12px;
            color: var(--text-faint);
            margin-top: 10px;
        }
        .intro .play-running {
            display: inline-block;
            margin-top: 16px;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text-faint);
            border: 1px solid var(--border);
            padding: 4px 16px;
            border-radius: 20px;
        }

        /* サンプル質問 */
        .samples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
        }
        .sample-btn {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 22px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-sub);
        }
        .sample-btn:hover {
            border-color: var(--navy);
            color: var(--navy);
            background: var(--yellow-soft);
        }

        /* 入力エリア */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            z-index: 100;
        }
        .input-inner {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }
        .input-inner input {
            flex: 1;
            padding: 13px 18px;
            border: 2px solid var(--border);
            border-radius: 26px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            background: var(--bg);
        }
        .input-inner input:focus {
            border-color: var(--navy);
        }
        .input-inner input::placeholder {
            color: var(--text-faint);
        }
        .input-inner button {
            background: var(--navy);
            color: white;
            border: none;
            padding: 13px 26px;
            border-radius: 26px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .input-inner button:hover {
            background: var(--navy-light);
        }
        .input-inner button:disabled {
            background: var(--text-faint);
            cursor: not-allowed;
        }

        /* 結果 */
        .results { margin-top: 8px; }

        /* AIコメント */
        .ai-comment {
            background: var(--card);
            border-radius: 14px;
            padding: 24px 28px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--yellow);
        }
        .ai-comment .label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .ai-comment .label-icon {
            width: 28px;
            height: 28px;
            background: var(--yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 900;
            color: var(--navy);
        }
        .ai-comment .label-text {
            font-size: 12px;
            font-weight: 700;
            color: var(--navy);
            letter-spacing: 1px;
        }
        .ai-comment .text {
            font-size: 15px;
            line-height: 1.9;
            color: var(--text);
        }

        /* 動画セクション */
        .video-section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-faint);
            margin: 24px 0 12px;
            letter-spacing: 1px;
        }
        .video-card {
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }
        .video-card:hover {
            transform: translateY(-2px);
        }
        .video-card a {
            text-decoration: none;
            color: inherit;
            display: flex;
        }
        .video-thumb {
            width: 180px;
            min-width: 180px;
            height: 101px;
            object-fit: cover;
            background: var(--bg);
        }
        .video-info {
            padding: 12px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .video-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--text);
        }
        .video-reason {
            font-size: 12px;
            color: var(--navy);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            opacity: 0.7;
        }
        .video-meta {
            font-size: 11px;
            color: var(--text-faint);
            margin-top: 4px;
        }

        /* ローディング */
        .loading {
            text-align: center;
            padding: 48px;
        }
        .dots {
            display: inline-flex;
            gap: 6px;
            margin-bottom: 14px;
        }
        .dots span {
            width: 8px;
            height: 8px;
            background: var(--yellow);
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }
        .loading-text {
            color: var(--text-faint);
            font-size: 13px;
        }

        /* エラー */
        .error {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 24px;
            color: var(--text-sub);
            font-size: 14px;
        }

        /* フッター */
        .footer {
            text-align: center;
            padding: 24px 0 8px;
        }
        .footer-tag {
            display: inline-block;
            font-size: 11px;
            color: var(--text-faint);
            letter-spacing: 2px;
            border: 1px solid var(--border);
            padding: 4px 14px;
            border-radius: 16px;
        }

        /* レスポンシブ */
        @media (max-width: 600px) {
            .intro .catchphrase { font-size: 18px; }
            .video-card a { flex-direction: column; }
            .video-thumb { width: 100%; height: 180px; min-width: auto; }
            .ai-comment { padding: 18px 18px; }
            .samples { gap: 6px; }
            .sample-btn { font-size: 12px; padding: 6px 12px; }
            .header .logo-mark { font-size: 24px; letter-spacing: 6px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-mark">為末大学 <span class="ai-tag">AI</span></div>
        <div class="logo-sub">TAMESUE ACADEMY</div>
    </div>

    <div class="main">
        <div class="intro">
            <div class="catchphrase">一歩一歩に夢中になる</div>
            <p class="description">
                走り方、身体のこと、学びのこと、あそびのこと。<br>
                何でも聞いてください。一緒に考えましょう。
            </p>
            <div class="stats">{{ total_videos }} 本の動画の知見をもとに回答します</div>
            <div class="play-running">#PlayRunning</div>

            <div class="samples">
                <button class="sample-btn" onclick="askSample(this)">時計を外して走ると何が変わる？</button>
                <button class="sample-btn" onclick="askSample(this)">速く走ろうとすると遅くなるのはなぜ？</button>
                <button class="sample-btn" onclick="askSample(this)">子どもの足が遅いのですが</button>
                <button class="sample-btn" onclick="askSample(this)">走ると膝が痛くなる</button>
                <button class="sample-btn" onclick="askSample(this)">練習のモチベーションが続かない</button>
                <button class="sample-btn" onclick="askSample(this)">蹴らない走り方とは？</button>
            </div>
        </div>

        <div id="results" class="results"></div>

        <div class="footer">
            <div class="footer-tag">#PlayRunning</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-inner">
            <input type="text" id="question" placeholder="何でも聞いてください"
                   onkeydown="if(event.key==='Enter')askQuestion()">
            <button id="askBtn" onclick="askQuestion()">聞く</button>
        </div>
    </div>

    <script>
        const resultsEl = document.getElementById('results');
        const questionEl = document.getElementById('question');
        const askBtn = document.getElementById('askBtn');

        function askSample(btn) {
            questionEl.value = btn.textContent;
            askQuestion();
        }

        let isAsking = false;

        async function askQuestion() {
            const q = questionEl.value.trim();
            if (!q || isAsking) return;

            isAsking = true;
            askBtn.disabled = true;
            questionEl.value = '';
            questionEl.blur();
            resultsEl.innerHTML = `
                <div class="loading">
                    <div class="dots"><span></span><span></span><span></span></div>
                    <div class="loading-text">「${escapeHtml(q)}」について考えています...</div>
                </div>
            `;

            try {
                const resp = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q, n_videos: 3 }),
                });
                if (!resp.ok) throw new Error(resp.status);
                const data = await resp.json();
                renderResults(data);
            } catch (err) {
                resultsEl.innerHTML = `
                    <div class="error">
                        申し訳ありません。うまく回答できませんでした。<br>
                        少し時間をおいてもう一度お試しください。
                    </div>
                `;
            } finally {
                askBtn.disabled = false;
                isAsking = false;
            }
        }

        function renderResults(data) {
            let html = '';
            html += `
                <div class="ai-comment">
                    <div class="label">
                        <div class="label-icon">為</div>
                        <div class="label-text">AI 為末大学</div>
                    </div>
                    <div class="text">${escapeHtml(data.comment)}</div>
                </div>
            `;
            if (data.recommended_videos && data.recommended_videos.length > 0) {
                html += '<div class="video-section-title">おすすめ動画</div>';
                for (const v of data.recommended_videos) {
                    html += `
                        <div class="video-card">
                            <a href="${escapeHtml(v.url)}" target="_blank" rel="noopener">
                                <img class="video-thumb"
                                     src="${escapeHtml(v.thumbnail)}"
                                     alt="${escapeHtml(v.title)}"
                                     loading="lazy"
                                     onerror="this.src='https://img.youtube.com/vi/${escapeHtml(v.video_id)}/hqdefault.jpg'">
                                <div class="video-info">
                                    <div class="video-title">${escapeHtml(v.title)}</div>
                                    <div class="video-reason">${escapeHtml(v.reason)}</div>
                                    ${v.categories && v.categories.length ? `<div class="video-meta">${v.categories.join(' / ')}</div>` : ''}
                                </div>
                            </a>
                        </div>
                    `;
                }
            }
            resultsEl.innerHTML = html;
            resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
